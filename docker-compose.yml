version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: biile_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-elearning}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-elearning123}
      POSTGRES_DB: ${DB_NAME:-biile_elearning}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elearning"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biile_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biile_backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-elearning}:${DB_PASSWORD:-elearning123}@postgres:5432/${DB_NAME:-biile_elearning}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_this_in_production}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - biile_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biile_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
      REACT_APP_ENV: ${REACT_APP_ENV:-development}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - biile_network
    command: npm start

volumes:
  postgres_data:
    driver: local

networks:
  biile_network:
    driver: bridge
