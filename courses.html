<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIILE E-LEARNING - Casharradaada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f6f4; color: #333; padding: 20px; }
        .header { background: #1b6333; color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }
        h3 { color: #1b6333; }
        
        /* Player-ka Google Drive ee rasmiga ah (Video Box) */
        .video-player-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border-top: 5px solid #1b6333; display: none; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; margin-top: 15px; border-radius: 8px; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* Shaxda Maadooyinka */
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .course-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid #1b6333; transition: 0.3s; }
        .course-card:hover { transform: translateY(-5px); }
        .course-card h4 { margin-bottom: 10px; color: #124222; }
        .course-card p { font-size: 14px; color: #666; margin-bottom: 15px; }
        
        /* Badhamada */
        .btn-watch { display: inline-block; padding: 10px 15px; background: #1b6333; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; width: 100%; }
        .btn-watch:hover { background: #124222; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 id="welcomeText">Ku soo dhawaada, Arday!</h2>
        <p style="font-size: 14px; opacity: 0.9;">Kani waa boggaaga casharrada rasmiga ah</p>
    </div>
    <a href="#" onclick="logout()" class="btn-logout">Ka Bax (Logout)</a>
</div>

<div class="container">
    
    /* Sanduuqa weyn ee Video-ga lagu dhex daawanayo */
    <div id="videoPlayerBox" class="video-player-section">
        <h4 id="playingVideoTitle" style="color: #124222;">Hadda Daawado: </h4>
        <div class="video-container">
            <iframe id="videoIframe" src="" allow="autoplay"></iframe>
        </div>
    </div>

    <div>
        <h3>Maadooyinka Neku Qoran:</h3>
        <div id="coursesContainer" class="courses-grid"></div>
    </div>
</div>

<script>
    // Liiska afarta maado oo lagu daray linkigaaga rasmiga ah ee Google Drive ee la habeeyey
    const liiskaMaadooyinka = {
        "xisaab": {
            title: "Xisaab (Mathematics)",
            desc: "Weli lama soo galin maadada, fadlan la xiriir maamulka Biile E-learning.",
            videoUrl: "" 
        },
        "communication": {
            title: "Xirfadaha Xiriirka (Communication Skills)",
            desc: "Barashada qaabka xiriirka furan, dhiirigelinta, iyo wadashaqaynta.",
            videoUrl: "https://google.com" 
        },
        "physics": {
            title: "Fiisigis (Physics)",
            desc: "Weli lama soo galin maadada, fadlan la xiriir maamulka Biile E-learning.",
            videoUrl: "" 
        },
        "arabic": {
            title: "Luuqada Carabiga (Arabic Language)",
            desc: "Barashada naxwaha, higgaadda, iyo ku hadalka Luuqada Carabiga.",
            /* HALKAN WAXAA LA GELIYAY LINKIGII CUSBAA EE CASHARKAAGA */
            videoUrl: "https://google.com" 
        }
    };

    // Maado qeybsiga dhamaan ardaydaadii rasmiga ahayd
    const xogtaArdayda = {
        "siciid": ["xisaab"], "nuur": ["xisaab"], "faarax": ["xisaab"], 
        "guuleed": ["xisaab"], "carab": ["xisaab"], "kuusane": ["xisaab"], "buurane": ["xisaab"],
        "yusro": ["communication"], "falis": ["communication"], "nuurt": ["communication"], 
        "dhuuxo": ["communication"], "sareedo": ["communication"], "barni": ["communication"],
        "cali": ["physics"], "lugay": ["physics"], "afey": ["physics"],
        "saxar": ["arabic"], "cumar": ["arabic"]
    };

    const loggedInUser = localStorage.getItem("loggedInUser");

    if (!loggedInUser) {
        window.location.href = "index.html";
    } else {
        document.getElementById("welcomeText").innerText = "Ku soo dhawaada, " + loggedInUser.toUpperCase();
        bixiMaadooyinka(loggedInUser);
    }

    function bixiMaadooyinka(username) {
        const container = document.getElementById("coursesContainer");
        const maadooyinkaArdayga = xogtaArdayda[username] || [];

        if (maadooyinkaArdayga.length === 0) {
            container.innerHTML = "<p>Weli laguma qorin wax maado ah. Fadlan la xiriir maamulka Biile E-learning.</p>";
            return;
        }

        maadooyinkaArdayga.forEach(maadoKey => {
            const data = liiskaMaadooyinka[maadoKey];
            if (data) {
                const badhanMuuqaal = data.videoUrl ? 
                    `<button onclick="daawadoVideo('${maadoKey}')" class="btn-watch">Fura Casharka →</button>` : 
                    `<span style="color: #dc3545; font-weight: 500; font-size: 14px;">⚠️ Diyaar ma aha</span>`;

                const card = `
                    <div class="course-card">
                        <h4>${data.title}</h4>
                        <p>${data.desc}</p>
                        ${badhanMuuqaal}
                    </div>
                `;
                container.innerHTML += card;
            }
        });
    }

    function daawadoVideo(maadoKey) {
        const data = liiskaMaadooyinka[maadoKey];
        if (data && data.videoUrl) {
            document.getElementById("playingVideoTitle").innerText = "Hadda Daawado: " + data.title;
            document.getElementById("videoIframe").src = data.videoUrl;
            document.getElementById("videoPlayerBox").style.display = "block";
            document.getElementById("videoPlayerBox").scrollIntoView({ behavior: 'smooth' });
        }
    }

    function logout() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
