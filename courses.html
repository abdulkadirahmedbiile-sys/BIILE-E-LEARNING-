<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIILE E-LEARNING - Casharradaada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f6f4; color: #333; padding: 20px; }
        .header { background: #1b6333; color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h3 { color: #1b6333; margin-bottom: 20px; }
        
        /* Shaxda Maadooyinka */
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .course-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid #1b6333; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; height: 180px; }
        .course-card h4 { margin-bottom: 8px; color: #124222; }
        .course-card p { font-size: 14px; color: #666; margin-bottom: 15px; }
        
        /* Badhamada */
        .btn-watch { display: block; padding: 12px 15px; background: #1b6333; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; text-align: center; border: none; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-watch:hover { background: #124222; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; font-size: 14px; }

        /* --- DAWERAHADA CASHARKA (VIDEO MODAL BOX) --- */
        .video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.3s ease; }
        .modal-content { background: white; width: 90%; max-width: 750px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; }
        .modal-header { padding: 15px 20px; background: #1b6333; color: white; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h4 { font-size: 16px; }
        .close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; font-weight: bold; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #000; }
        
        /* Farriinta marka casharku diyaar uusan ahayn */
        .not-ready-box { padding: 40px 20px; text-align: center; color: #333; background: #fff; font-size: 18px; font-weight: 500; }
        .not-ready-box span { display: block; font-size: 40px; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 id="welcomeText">Ku soo dhawaada, Arday!</h2>
        <p style="font-size: 14px; opacity: 0.9;">Kani waa boggaaga casharrada rasmiga ah</p>
    </div>
    <a href="#" onclick="logout()" class="btn-logout">Ka Bax (Logout)</a>
</div>

<div class="container">
    <div>
        <h3>Maadooyinka Neku Qoran:</h3>
        <div id="coursesContainer" class="courses-grid"></div>
    </div>
</div>

<!-- SHABAKADA SHASHADA CASHARKA (MODAL) -->
<div id="videoModal" class="video-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h4 id="modalVideoTitle">Daawashada Casharka</h4>
            <button class="close-btn" onclick="XirCasharka()">&times;</button>
        </div>
        <div class="video-container" id="playerWrapper">
            <!-- Muuqaalka caadiga ah ayaa halkan si toos ah ugu dhex dhalan doona -->
        </div>
    </div>
</div>

<script>
    // XOGTA MAADOODINKA
    const liiskaMaadooyinka = {
        "xisaab": {
            title: "Xisaab (Mathematics)",
            desc: "Barashada xisaabta guud iyo qaaciidooyinka muhiimka ah.",
            videoUrl: "" 
        },
        "communication": {
            title: "Xirfadaha Xiriirka (Communication Skills)",
            desc: "Barashada qaabka xiriirka furan, dhiirigelinta, iyo wadashaqaynta.",
            // XALLIS: Waxaan u beddelay Direct Stream Link (uc?export=download&id=...) si uu si toos ah ugu dhex dhalo Player-kaaga hoose.
            videoUrl: "https://google.com" 
        },
        "physics": {
            title: "Fiisigis (Physics)",
            desc: "Barashada xeerarka dabeecadda iyo awoodaha unugyada.",
            videoUrl: "" 
        },
        "arabic": {
            title: "Luuqada Carabiga (Arabic Language)",
            desc: "Barashada naxwaha, higgaadda, iyo ku hadalka Luuqada Carabiga.",
            videoUrl: "" 
        }
    };

    // Maado qeybsiga ardayda rasmiga ah
    const xogtaArdayda = {
        "siciid": ["xisaab"], "nuur": ["xisaab"], "faarax": ["xisaab"], 
        "guuleed": ["xisaab"], "carab": ["xisaab"], "kuusane": ["xisaab"], "buurane": ["xisaab"],
        "yusro": ["communication"], "falis": ["communication"], "nuurt": ["communication"], 
        "dhuuxo": ["communication"], "sareedo": ["communication"], "barni": ["communication"],
        "cali": ["physics"], "lugay": ["physics"], "afey": ["physics"],
        "saxar": ["arabic"], "cumar": ["arabic"]
    };

    const loggedInUser = localStorage.getItem("loggedInUser");

    if (!loggedInUser) {
        window.location.href = "index.html";
    } else {
        document.getElementById("welcomeText").innerText = "Ku soo dhawaada, " + loggedInUser.toUpperCase();
        bixiMaadooyinka(loggedInUser);
    }

    function bixiMaadooyinka(username) {
        const container = document.getElementById("coursesContainer");
        const maadooyinkaArdayga = xogtaArdayda[username] || [];

        if (maadooyinkaArdayga.length === 0) {
            container.innerHTML = "<p>Weli laguma qorin wax maado ah. Fadlan la xiriir maamulka Biile E-learning.</p>";
            return;
        }

        maadooyinkaArdayga.forEach(maadoKey => {
            const data = liiskaMaadooyinka[maadoKey];
            if (data) {
                const card = `
                    <div class="course-card">
                        <div>
                            <h4>${data.title}</h4>
                            <p>${data.desc}</p>
                        </div>
                        <button onclick="FurCasharka('${maadoKey}')" class="btn-watch">Fura Casharka →</button>
                    </div>
                `;
                container.innerHTML += card;
            }
        });
    }

    // SHAQADA FUREYSA CASHARKA AMA STR-TA FARRIINTA
    function FurCasharka(maadoKey) {
        const maadada = liiskaMaadooyinka[maadoKey];
        if (!maadada) return;

        document.getElementById("modalVideoTitle").innerText = maadada.title;
        const wrapper = document.getElementById("playerWrapper");
        
        if (!maadada.videoUrl) {
            wrapper.parentNode.style.paddingBottom = "0"; 
            wrapper.parentNode.style.height = "auto";
            wrapper.innerHTML = `
                <div class="not-ready-box">
                    <span>⚠️</span>
                    <p>Casharkaan weli ma diyaarsana. <br>Fadlan la xiriir maamulka Biile E-learning.</p>
                </div>`;
        } else {
            wrapper.parentNode.style.paddingBottom = "56.25%"; 
            wrapper.parentNode.style.height = "0";
            
            // GUULEYSI: Muuqaalku wuxuu hadda ku furmayaa Video Player-ka rasmiga ah ee shabakadaada dhexdeeda (Ma ahan Google)
            wrapper.innerHTML = `
                <video controls autoplay controlsList="nodownload">
                    <source src="${maadada.videoUrl}" type="video/mp4">
                    Browser-kaagu ma caawinayo daawashada video-ga.
                </video>`;
        }
        
        document.getElementById("videoModal").style.display = "flex";
    }

    // SHAQADA XIREYSA CASHARKA
    function XirCasharka() {
        document.getElementById("videoModal").style.display = "none";
        document.getElementById("playerWrapper").innerHTML = ""; 
    }

    function logout() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
