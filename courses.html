<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning Portal</title>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">

    <!-- NAV BAR -->
    <nav class="bg-blue-600 text-white p-4 rounded-xl mb-6 flex justify-between font-bold">
        <span>🎓 Aqoonyahan Portal</span>
        <span class="text-sm bg-blue-700 px-3 py-1 rounded-full">👤 Aanis Maxamed (ID: SOM-2026-098)</span>
    </nav>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- FORM-KA MAAMULKA (SOO GELINTA) -->
        <div class="bg-white p-5 rounded-xl shadow-sm h-fit">
            <h3 class="font-bold text-gray-700 mb-3 text-lg border-b pb-2">➕ Ku Dar Koorso</h3>
            <form id="courseForm" class="space-y-3" onsubmit="addCourse(event)">
                <input type="text" id="title" required placeholder="Magaca Koorsada" class="w-full border p-2 rounded text-sm">
                <input type="text" id="teacher" required placeholder="Magaca Macallinka" class="w-full border p-2 rounded text-sm">
                <select id="status" class="w-full border p-2 rounded text-sm">
                    <option value="diyaar">Diyaar (Waa furan tahay)</option>
                    <option value="dhawaan">Weli lama soo gelin</option>
                </select>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded text-sm font-bold">Soo Geli Koorsada</button>
            </form>
        </div>

        <!-- LIST-KA KOORSOOYINKA -->
        <div class="md:col-span-2 space-y-4">
            <h2 class="text-xl font-bold text-gray-800">📘 Koorsooyinka (<span id="count">0</span>)</h2>
            <div id="container" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>
        let koorsooyinka = [
            { magaca: "Hordhaca HTML & CSS", macallin: "Eng. Cali", status: "diyaar" },
            { magaca: "Barashada JavaScript", macallin: "Aamina Axmed", status: "diyaar" },
            { magaca: "Dhismaha Database-ka", macallin: "Cumar Xasan", status: "dhawaan" }
        ];

        function renderCourses() {
            const container = document.getElementById("container");
            document.getElementById("count").innerText = koorsooyinka.length;
            
            if (koorsooyinka.length === 0) {
                container.innerHTML = `<div class="col-span-2 bg-yellow-100 text-yellow-800 p-4 rounded-lg font-medium text-sm">⚠️ Nidaamka waa maran yahay! Weli wax koorso ah laguma soo biirin.</div>`;
                return;
            }

            container.innerHTML = "";
            koorsooyinka.forEach(k => {
                const card = document.createElement("div");
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between";
                
                if (k.status === "diyaar") {
                    card.innerHTML = `
                        <div>
                            <span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-0.5 rounded">Diyaar</span>
                            <h3 class="font-bold text-gray-800 mt-2">${k.magaca}</h3>
                            <p class="text-xs text-gray-500 mb-4">Macallin: ${k.macallin}</p>
                        </div>
                        <button onclick="alert('Casharka waa furan yahay!')" class="w-full bg-gray-100 text-gray-700 text-xs py-2 rounded font-bold hover:bg-blue-600 hover:text-white transition">Bilow Barashada</button>`;
                } else {
                    card.innerHTML = `
                        <div class="opacity-60">
                            <span class="bg-red-100 text-red-700 text-xs font-bold px-2 py-0.5 rounded">Dhawaan</span>
                            <h3 class="font-bold text-gray-800 mt-2">${k.magaca}</h3>
                            <p class="text-xs text-gray-500 mb-2">Macallin: ${k.macallin}</p>
                        </div>
                        <p class="bg-red-50 text-red-700 p-2 rounded text-xs">⏳ <strong>Dareen-celin:</strong> Maadadan weli casharradeeda lama soo dhigin.</p>`;
                }
                container.appendChild(card);
            });
        }

        function addCourse(e) {
            e.preventDefault();
            koorsooyinka.push({
                magaca: document.getElementById("title").value,
                macallin: document.getElementById("teacher").value,
                status: document.getElementById("status").value
            });
            renderCourses();
            document.getElementById("courseForm").reset();
        }

        renderCourses();
    </script>
</body>
</html>
