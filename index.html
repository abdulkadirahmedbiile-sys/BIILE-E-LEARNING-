<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIILE E-LEARNING - Soo Gali</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f6f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; border-top: 5px solid #1b6333; }
        .logo-box { width: 100%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .logo-img { width: 100%; max-width: 280px; height: auto; display: block; }
        h2 { color: #1b6333; margin-bottom: 25px; font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #444; font-size: 14px; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid #cccccc; border-radius: 6px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #1b6333; box-shadow: 0 0 5px rgba(27,99,51,0.3); }
        button { width: 100%; padding: 12px; background: #1b6333; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #124222; }
        .error-message { color: #dc3545; font-size: 14px; margin-bottom: 15px; display: none; font-weight: 500; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-box">
        <!-- Hubi in sawirka logo.jpeg uu la yaalo faylkan bannaanka -->
        <img src="./logo.jpeg" alt="BIILE E-LEARNING Logo" class="logo-img"> 
    </div>
    
    <h2>BIILE E-LEARNING</h2>
    <div id="errorMsg" class="error-message">Magaca ama furaha aad gelisay waa khalad!</div>

    <form id="loginForm" onsubmit="gudbi(event)">
        <div class="input-group">
            <label for="username">Magaca Ardayga (Username)</label>
            <input type="text" id="username" required placeholder="Gali username kaaga">
        </div>
        <div class="input-group">
            <label for="password">Furaha (Password)</label>
            <input type="password" id="password" required placeholder="Gali password kaaga">
        </div>
        <button type="submit">LOGIN</button>
    </form>
</div>

<script>
    // Liiska dhamaan ardayda iyo furayaashooda rasmiga ah (Halkan ayaad hadhow arday ka dari kartaa)
    const ardayda = {
        // Kooxda Xisaabta (Mathematics)
        "siciid": "siciid123", "nuur": "nuur123", "faarax": "faarax123", 
        "guuleed": "guuleed123", "carab": "carab123", "kuusane": "kuusane123", "buurane": "buurane123",
        // Kooxda Communication Skills
        "yusro": "yusro123", "falis": "falis123", "nuurt": "nuurt123", 
        "dhuuxo": "dhuuxo123", "sareedo": "sareedo123", "barni": "barni123",
        // Kooxda Physics
        "cali": "cali123", "lugay": "lugay123", "afey": "afey123",
        // Kooxda Arabic Language
        "saxar": "saxar123", "cumar": "cumar123"
    };

    function gudbi(event) {
        event.preventDefault();
        const usernameInput = document.getElementById("username").value.trim().toLowerCase();
        const passwordInput = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMsg");

        if (ardayda[usernameInput] && ardayda[usernameInput] === passwordInput) {
            errorMsg.style.display = "none";
            // Waxay xogta u gudbinaysaa bogga xiga
            localStorage.setItem("loggedInUser", usernameInput);
            window.location.href = "courses.html";
        } else {
            errorMsg.style.display = "block";
        }
    }
</script>

</body>
</html>
